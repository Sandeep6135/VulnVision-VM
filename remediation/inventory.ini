---
# VulnVision 360 - Automated "Closed Loop" Remediation Playbook
# Target: Remediate High-Severity CVEs in OpenSSH and OpenSSL

- name: Execute Critical Vulnerability Patching
  hosts: webservers
  become: yes
  tasks:
    - name: Ensure target systems have the latest patched version of OpenSSH
      apt:
        name: openssh-server
        state: latest
        update_cache: yes
      register: ssh_update

    - name: Ensure target systems have the latest patched version of OpenSSL
      apt:
        name: openssl
        state: latest
      register: ssl_update

    - name: Restart SSH service if updated
      service:
        name: sshd
        state: restarted
      when: ssh_update.changed

    - name: Log remediation action locally
      local_action: 
        module: lineinfile
        path: ../reports/remediation_log.txt
        line: "{{ ansible_date_time.iso8601 }} - Patched {{ inventory_hostname }} successfully."
        create: yes